<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>教材 | AI教育ラボ Members</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-page="library" data-base=".">
    <div class="app-shell">
      <aside class="sidebar" data-shell-sidebar aria-label="メンバーサイトナビゲーション"></aside>
      <main class="portal">
        <header class="topbar" data-shell-topbar></header>
        <section class="page-hero page-hero--image">
          <div>
            <p class="eyebrow">Content Library</p>
            <h2>教材は、家庭でそのまま試せる形に。</h2>
            <p>アンケートとLINEで多かった悩みを、教材・プロンプト・実演に分けて並べています。</p>
          </div>
          <img src="./assets/generated/photo-pdf-tutor.png" alt="写真やPDFをAI家庭教師に変える教材">
        </section>
        <section class="section-block">
          <div class="module-grid" data-content-modules></div>
        </section>
      </main>
    </div>
    <div class="toast" role="status" aria-live="polite" data-toast></div>
    <script src="./content.js" defer></script>
    <script src="./shell.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>年齢別プロンプト | AI教育ラボ Members</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-page="age-prompts" data-base=".">
    <div class="app-shell">
      <aside class="sidebar" data-shell-sidebar aria-label="メンバーサイトナビゲーション"></aside>
      <main class="portal">
        <header class="topbar" data-shell-topbar></header>

        <section class="page-hero page-hero--image">
          <div>
            <p class="eyebrow">Age Based Prompts</p>
            <h2>幼稚園生から大学4年まで、成長段階で選べるプロンプト集。</h2>
            <p>遊び、宿題、探究、受験、レポート、卒論、就活まで、年齢ごとに「AIへ何を任せるか」を変えています。各ボタンから全文プロンプトを開いてコピーできます。</p>
          </div>
          <img src="./assets/generated/prompt-library.png" alt="年齢別プロンプトライブラリ">
        </section>

        <section class="age-path section-block">
          <div class="section-head section-head--split">
            <div>
              <p class="eyebrow">Prompt Roadmap</p>
              <h2>年齢別ロードマップ</h2>
              <p>幼児期は遊び、低学年は開始の足場、中高生は自走とテスト、大学生は研究・文章・キャリアへ。</p>
            </div>
            <a class="secondary secondary--light compact" href="./prompts.html">全プロンプトを見る</a>
          </div>
          <div class="age-track-grid" data-content-age-prompts></div>
        </section>
      </main>
    </div>
    <div class="toast" role="status" aria-live="polite" data-toast></div>
    <script src="./content.js" defer></script>
    <script src="./shell.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>

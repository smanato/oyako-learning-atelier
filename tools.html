<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ツール設定 | AI教育ラボ Members</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-page="tools" data-base=".">
    <div class="app-shell">
      <aside class="sidebar" data-shell-sidebar aria-label="メンバーサイトナビゲーション"></aside>
      <main class="portal">
        <header class="topbar" data-shell-topbar></header>
        <section class="tool-section section-block">
          <figure class="tool-hero">
            <img src="./assets/generated/tool-setup.png" alt="AIツールの設定ガイド">
          </figure>
          <div class="tool-copy">
            <div class="section-head">
              <p class="eyebrow">Tool Setup</p>
              <h2>どのAIを使えばいい？を迷わせない。</h2>
              <p>無料から始められるものを中心に、家庭学習での役割を分けています。</p>
            </div>
            <div class="tool-grid" data-content-tools></div>
          </div>
        </section>
        <section class="tool-setup-playbook section-block">
          <div class="section-head section-head--split">
            <div>
              <p class="eyebrow">First 30 Minutes</p>
              <h2>5つのAIを、家庭学習で使える状態にする。</h2>
              <p>ログイン後にどこを触ればいいか、最初に何を作ればいいか、子どもに使わせる前に親が何を見るかまで整理しました。</p>
            </div>
            <a class="secondary secondary--light compact" href="./prompts.html?prompt=toolChooserPrompt">迷った時のプロンプト</a>
          </div>
          <p class="tool-setup-note">画面名や無料枠は変わることがあります。ここでは「親が無料から試し、家庭学習に安全に入れる」ための最短ルートに絞っています。</p>
          <div class="tool-setup-list" data-content-tool-setups></div>
        </section>
      </main>
    </div>
    <div class="toast" role="status" aria-live="polite" data-toast></div>
    <script src="./content.js" defer></script>
    <script src="./shell.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
